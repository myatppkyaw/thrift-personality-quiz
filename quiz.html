<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>From Stigma to Story: Which Thrifted Object Chooses You?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #881210;
      --panel: rgba(255, 244, 244, 0.86);
      --answer: #efc5c2;
      --answer-selected: #d9928e;
      --button: #95110e;
      --border: rgba(136, 18, 16, 0.76);
      --body-font: "Schoolbell", "Comic Sans MS", cursive;
      --heading-font: "FF Providence Sans", "Schoolbell", "Comic Sans MS", cursive;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background: #f7eadb url("assets/background.png") center / cover no-repeat;
      font-family: var(--body-font);
    }

    body {
      display: grid;
      place-items: center;
    }

    button {
      font: inherit;
      color: inherit;
    }

    .stage {
      width: min(100vw, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      background: url("assets/background.png") center / cover no-repeat;
    }

    .panel {
      position: absolute;
      inset: 10.3% 10.1% 7%;
      border: clamp(24px, 2.2vw, 42px) solid var(--border);
      border-radius: clamp(32px, 3vw, 56px);
      background: var(--panel);
      box-shadow: inset 0 0 0 2px rgba(136, 18, 16, 0.03);
      display: grid;
      overflow: hidden;
      padding: 3.2% 7.5% 2.7%;
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
    }

    .screen.active {
      display: grid;
    }

    .question-screen {
      position: relative;
      grid-template-rows: auto auto auto 1fr;
      align-items: start;
      text-align: center;
      padding-bottom: clamp(58px, 7.2vh, 78px);
    }

    .progress {
      margin-top: 0.2%;
      font-size: clamp(16px, 1.45vw, 27px);
      line-height: 1;
      opacity: 0.72;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .question-heading {
      margin-top: 1.5%;
      font-family: var(--heading-font);
      font-size: clamp(22px, 2.15vw, 39px);
      line-height: 1.05;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .question-text {
      margin: 1% auto 0;
      max-width: 92%;
      font-family: var(--heading-font);
      font-size: clamp(16px, 1.58vw, 29px);
      line-height: 1.18;
      letter-spacing: 0;
      text-transform: uppercase;
      text-wrap: pretty;
    }

    .answers {
      width: 92%;
      margin: 2.8% auto 0;
      display: grid;
      gap: clamp(7px, 1.05vh, 12px);
    }

    .answer {
      min-height: clamp(31px, 4.65vh, 50px);
      border: 0;
      border-radius: 999px;
      background: var(--answer);
      padding: 0.24em 1.2em 0.34em;
      color: var(--ink);
      text-align: left;
      font-size: clamp(14px, 1.34vw, 24px);
      line-height: 1.12;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    .answer:hover {
      transform: translateY(-1px);
      background: #e9b8b5;
    }

    .answer.selected {
      background: var(--answer-selected);
      box-shadow: 0 0 0 4px rgba(136, 18, 16, 0.16), inset 0 0 0 2px rgba(136, 18, 16, 0.35);
    }

    .nav {
      position: absolute;
      left: 4%;
      right: 4%;
      bottom: 1%;
      width: auto;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav.single {
      justify-content: flex-end;
    }

    .btn {
      min-width: clamp(112px, 8.5vw, 150px);
      min-height: clamp(32px, 4vh, 42px);
      border-radius: 10px;
      border: 2px solid rgba(136, 18, 16, 0.55);
      background: var(--button);
      color: #fff8f5;
      font-size: clamp(16px, 1.3vw, 24px);
      line-height: 1;
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(136, 18, 16, 0.8), inset 0 0 0 2px rgba(255, 255, 255, 0.78);
    }

    .btn.secondary {
      background: #f2c8c4;
      color: var(--ink);
      box-shadow: none;
    }

    .btn:disabled {
      cursor: default;
      opacity: 0.5;
      transform: none;
    }

    .result-screen {
      grid-template-columns: 46% 54%;
      align-items: center;
      column-gap: 1.8%;
      padding: 0 5.5% 2.2% 1.2%;
    }

    .character-wrap {
      display: grid;
      place-items: center start;
      height: 100%;
    }

    .character {
      max-width: 106%;
      max-height: 67%;
      object-fit: contain;
    }

    .result-copy {
      align-self: center;
      transform: translateY(-1%);
    }

    .eyebrow {
      font-size: clamp(20px, 1.75vw, 32px);
      line-height: 1;
      margin-bottom: 3%;
    }

    .result-title {
      font-family: var(--heading-font);
      font-size: clamp(29px, 2.82vw, 51px);
      line-height: 1.02;
      letter-spacing: 0;
      text-transform: uppercase;
      margin-bottom: 3.6%;
    }

    .result-description {
      max-width: 93%;
      font-size: clamp(17px, 1.55vw, 28px);
      line-height: 1.24;
      margin-bottom: 3.8%;
      text-wrap: pretty;
    }

    .quote-box {
      width: 92%;
      min-height: clamp(62px, 8.6vh, 92px);
      display: grid;
      place-items: center;
      padding: 0.9% 5%;
      border-radius: 24px;
      background: var(--answer);
      color: rgba(136, 18, 16, 0.52);
      font-size: clamp(18px, 1.58vw, 29px);
      line-height: 1.12;
      text-align: center;
      margin-bottom: 4.4%;
      text-wrap: pretty;
    }

    .reflection-btn {
      margin-left: 1.2%;
      min-width: clamp(170px, 14vw, 240px);
      min-height: clamp(44px, 5.7vh, 62px);
      font-size: clamp(20px, 1.55vw, 29px);
    }

    .reflection-screen {
      place-items: center;
      text-align: center;
      padding: 0 12%;
    }

    .reflection-content {
      transform: translateY(1%);
      display: grid;
      justify-items: center;
    }

    .reflection-title {
      font-family: var(--heading-font);
      font-size: clamp(35px, 3.2vw, 59px);
      line-height: 1.08;
      letter-spacing: 0;
      text-transform: uppercase;
      margin-bottom: 4%;
    }

    .reflection-text {
      max-width: 76%;
      font-size: clamp(24px, 2.2vw, 40px);
      line-height: 1.2;
      margin-bottom: 5%;
      text-wrap: pretty;
    }

    .reflection-quote {
      width: 55%;
      min-height: clamp(84px, 12vh, 118px);
      margin-bottom: 4.3%;
    }

    .start-again {
      min-width: clamp(190px, 16vw, 270px);
      min-height: clamp(54px, 7vh, 75px);
      font-size: clamp(22px, 1.8vw, 33px);
    }

    @media (max-aspect-ratio: 16 / 9) {
      .stage {
        width: 100vw;
      }
    }

    @media (max-width: 760px), (max-height: 520px) {
      .panel {
        inset: 5% 4%;
        padding: 4% 5%;
        border-width: 18px;
      }

      .question-screen {
        padding-bottom: 42px;
      }

      .answers {
        width: 100%;
        gap: 7px;
      }

      .answer {
        min-height: 29px;
        font-size: clamp(13px, 2.6vw, 16px);
      }

      .question-heading {
        font-size: clamp(18px, 4vw, 24px);
      }

      .question-text {
        font-size: clamp(14px, 3vw, 18px);
      }

      .result-screen {
        grid-template-columns: 38% 62%;
        padding: 0 4%;
      }

      .result-description,
      .quote-box {
        width: 100%;
        max-width: 100%;
      }
    }

    @media (max-width: 680px) and (orientation: portrait) {
      html,
      body {
        overflow: hidden;
      }

      .stage {
        width: 100vw;
        height: 100svh;
        aspect-ratio: auto;
      }

      .panel {
        inset: 3.2%;
        border-width: 14px;
        border-radius: 30px;
        padding: 7% 6% 6%;
        overflow: auto;
      }

      .screen.active {
        min-height: 100%;
      }

      .question-screen {
        display: grid;
        grid-template-rows: auto auto auto 1fr auto;
        padding-bottom: 0;
      }

      .progress {
        font-size: clamp(18px, 5.2vw, 24px);
      }

      .question-heading {
        margin-top: 5%;
        font-size: clamp(22px, 7vw, 31px);
        line-height: 1.08;
      }

      .question-text {
        max-width: 100%;
        margin-top: 4%;
        font-size: clamp(15px, 4.7vw, 21px);
        line-height: 1.2;
      }

      .answers {
        width: 100%;
        margin-top: 7%;
        gap: 9px;
        align-content: start;
      }

      .answer {
        min-height: 0;
        border-radius: 20px;
        padding: 0.58em 1em 0.66em;
        font-size: clamp(15px, 4.65vw, 20px);
        line-height: 1.16;
      }

      .answer.selected {
        box-shadow: 0 0 0 3px rgba(136, 18, 16, 0.14), inset 0 0 0 2px rgba(136, 18, 16, 0.35);
      }

      .nav {
        position: static;
        width: 100%;
        margin-top: 18px;
        padding-bottom: 2px;
      }

      .btn {
        min-width: 106px;
        min-height: 39px;
        font-size: clamp(17px, 5vw, 22px);
      }

      .result-screen {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        row-gap: 0;
        padding: 0;
        text-align: center;
        align-items: start;
      }

      .character-wrap {
        height: auto;
        place-items: center;
        margin-top: 1%;
      }

      .character {
        max-width: 74%;
        max-height: 31svh;
      }

      .result-copy {
        transform: none;
        align-self: start;
        display: grid;
        justify-items: center;
      }

      .eyebrow {
        margin-top: 2%;
        margin-bottom: 4%;
        font-size: clamp(19px, 5.5vw, 25px);
      }

      .result-title {
        margin-bottom: 5%;
        font-size: clamp(28px, 8.3vw, 39px);
        line-height: 1.05;
      }

      .result-description {
        max-width: 100%;
        margin-bottom: 5%;
        font-size: clamp(16px, 4.8vw, 22px);
        line-height: 1.22;
      }

      .quote-box {
        width: 100%;
        min-height: 58px;
        margin-bottom: 18px;
        border-radius: 20px;
        padding: 0.65em 1em 0.75em;
        font-size: clamp(17px, 4.9vw, 22px);
      }

      .reflection-btn {
        margin-left: 0;
        min-width: 160px;
        min-height: 44px;
      }

      .reflection-screen {
        padding: 0;
        align-items: center;
      }

      .reflection-content {
        transform: none;
        width: 100%;
      }

      .reflection-title {
        font-size: clamp(31px, 8.6vw, 42px);
        line-height: 1.08;
        margin-bottom: 8%;
      }

      .reflection-text {
        max-width: 100%;
        font-size: clamp(20px, 6vw, 27px);
        line-height: 1.18;
        margin-bottom: 8%;
      }

      .reflection-quote {
        width: 100%;
        margin-bottom: 8%;
      }

      .start-again {
        min-width: 170px;
        min-height: 46px;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="From Stigma to Story: Which Thrifted Object Chooses You?">
    <section class="panel" id="app"></section>
  </main>

  <script>
    const TYPES = {
      memory: {
        label: "The Memory Keeper",
        title: "THE MEMORY KEEPER",
        image: "assets/memory_keeper.png",
        alt: "Patchwork book character holding a heart locket",
        description: "You are drawn to objects that feel like they remember. You notice emotional traces, past moments, and the quiet feeling that an object once belonged to someone’s everyday life.",
        quote: "“Objects remember what we forget.”"
      },
      story: {
        label: "The Story Curator",
        title: "THE STORY CURATOR",
        image: "assets/story_curator.png",
        alt: "Wooden cabinet character holding a vase and magnifying glass",
        description: "You honour the past and the narratives objects carry. You believe that what came before deserves to be researched, shared, and remembered.",
        quote: "“Every object is a document of human life.”"
      },
      restorer: {
        label: "The Conscious Restorer",
        title: "THE CONSCIOUS RESTORER",
        image: "assets/conscious_restorer.png",
        alt: "Green apron character holding a needle and thread",
        description: "You see potential where others see waste. For you, secondhand is not second-best — it is a sustainable choice that honours both the planet and the object.",
        quote: "“Nothing is finished until we say it is.”"
      },
      identity: {
        label: "The Identity Maker",
        title: "THE IDENTITY MAKER",
        image: "assets/identity_maker.png",
        alt: "Pink star-shaped fashion character with a blue beret",
        description: "You believe objects carry personality and reflect who you are. What you choose tells the world your story and helps you become who you want to be.",
        quote: "“Style is not bought — it is inherited.”"
      },
      imperfection: {
        label: "The Imperfection Lover",
        title: "THE IMPERFECTION LOVER",
        image: "assets/imperfection_lover.png",
        alt: "Cracked ceramic cup character holding a flower",
        description: "You find beauty in the broken, the chipped, and the worn. Perfection bores you — authenticity excites you. Flaws tell the truest stories.",
        quote: "“Cracks let the light in.”"
      },
      connection: {
        label: "The Connection Giver",
        title: "THE CONNECTION GIVER",
        image: "assets/connection_giver.png",
        alt: "Yellow teapot character holding hands with two cups",
        description: "You believe objects carry warmth and human connection. Thrifting is about creating community, sharing stories, and building relationships across time and people.",
        quote: "“Warmth shared is warmth multiplied.”"
      }
    };

    const QUESTIONS = [
      {
        progress: "Question 1 of 3",
        heading: "QUESTION 1: FIRST REACTION",
        text: "WHEN YOU FIRST SEE A SECONDHAND OBJECT, WHAT MAKES YOU WANT TO LOOK CLOSER?",
        answers: [
          ["It feels like it has been part of someone’s life before.", "memory"],
          ["I want to know its age, origin, or where it came from.", "story"],
          ["I feel like it still has use and should not be wasted.", "restorer"],
          ["It looks different from ordinary things people buy today.", "identity"],
          ["The scratches, fading, or damage make it feel more real.", "imperfection"],
          ["I imagine how it moved from one person to another before reaching me.", "connection"]
        ]
      },
      {
        progress: "Question 2 of 3",
        heading: "QUESTION 2: CHALLENGING THE STIGMA",
        text: "MANY PEOPLE JUDGE THRIFTED ITEMS AS CHEAP, DIRTY, OR LOW-STATUS. WHAT WOULD MAKE YOU DISAGREE?",
        answers: [
          ["They may carry personal memories that we cannot see.", "memory"],
          ["They can preserve history that new products do not have.", "story"],
          ["Reusing them is a caring and practical way to reduce waste.", "restorer"],
          ["They help people create a style that feels personal, not copied.", "identity"],
          ["Their flaws show that they have lived, not that they are worthless.", "imperfection"],
          ["They create relationships between sellers, collectors, buyers, and future owners.", "connection"]
        ]
      },
      {
        progress: "Question 3 of 3",
        heading: "QUESTION 3: CONTINUING THE OBJECT’S LIFE",
        text: "IF YOU CHOSE ONE THRIFTED OBJECT TO CONTINUE ITS LIFE, WHAT WOULD MATTER MOST TO YOU?",
        answers: [
          ["Keeping its emotional feeling alive.", "memory"],
          ["Learning and sharing its background story.", "story"],
          ["Giving it a useful second life instead of letting it disappear.", "restorer"],
          ["Making it part of my personal style or space.", "identity"],
          ["Respecting its old marks instead of making it look brand new.", "imperfection"],
          ["Passing it on later so someone else can add another chapter.", "connection"]
        ]
      }
    ];

    const app = document.querySelector("#app");
    let currentQuestion = 0;
    let answers = [null, null, null];

    function noWidow(text) {
      return text.replace(/\s+(\S+)$/, "&nbsp;$1");
    }

    function renderQuestion(index) {
      currentQuestion = index;
      const question = QUESTIONS[index];
      const selected = answers[index];
      app.innerHTML = `
        <div class="screen question-screen active">
          <p class="progress">${question.progress}</p>
          <h1 class="question-heading">${question.heading}</h1>
          <h2 class="question-text">${noWidow(question.text)}</h2>
          <div class="answers" role="radiogroup" aria-label="${question.heading}">
            ${question.answers.map(([text, type], answerIndex) => `
              <button
                class="answer ${selected === type ? "selected" : ""}"
                type="button"
                role="radio"
                aria-checked="${selected === type}"
                data-type="${type}"
                data-answer-index="${answerIndex}"
              >${text}</button>
            `).join("")}
          </div>
          <div class="nav ${index === 0 ? "single" : ""}">
            ${index > 0 ? `<button class="btn secondary back-btn" type="button">Back</button>` : ""}
            <button class="btn next-btn" type="button" ${selected ? "" : "disabled"}>Next</button>
          </div>
        </div>
      `;

      app.querySelectorAll(".answer").forEach((button) => {
        button.addEventListener("click", () => {
          answers[index] = button.dataset.type;
          renderQuestion(index);
        });
      });

      app.querySelector(".next-btn").addEventListener("click", () => {
        if (!answers[index]) return;
        if (index < QUESTIONS.length - 1) {
          renderQuestion(index + 1);
        } else {
          renderResult(calculateResult());
        }
      });

      const backButton = app.querySelector(".back-btn");
      if (backButton) {
        backButton.addEventListener("click", () => renderQuestion(index - 1));
      }
    }

    function calculateResult() {
      const scores = Object.fromEntries(Object.keys(TYPES).map((type) => [type, 0]));
      answers.forEach((type) => {
        if (type) scores[type] += 1;
      });

      const orderedScores = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      const [winner, highScore] = orderedScores[0];
      const tiedWinners = orderedScores.filter(([, score]) => score === highScore);

      if (tiedWinners.length === 1) {
        return winner;
      }

      return answers[2];
    }

    function renderResult(type) {
      const result = TYPES[type];
      app.innerHTML = `
        <div class="screen result-screen active">
          <div class="character-wrap">
            <img class="character" src="${result.image}" alt="${result.alt}">
          </div>
          <div class="result-copy">
            <p class="eyebrow">Your Thrift Personality</p>
            <h1 class="result-title">${result.title}</h1>
            <p class="result-description">${noWidow(result.description)}</p>
            <p class="quote-box">${noWidow(result.quote)}</p>
            <button class="btn reflection-btn" type="button">Reflection</button>
          </div>
        </div>
      `;

      app.querySelector(".reflection-btn").addEventListener("click", renderReflection);
    }

    function renderReflection() {
      app.innerHTML = `
        <div class="screen reflection-screen active">
          <div class="reflection-content">
            <h1 class="reflection-title">EVERY OBJECT HAS A STORY</h1>
            <p class="reflection-text">${noWidow("The next time you see something secondhand, pause before judging. What story might it hold? What beauty might you be missing?")}</p>
            <p class="quote-box reflection-quote">${noWidow("Stigma fades when stories are heard.")}</p>
            <button class="btn start-again" type="button">Start Again</button>
          </div>
        </div>
      `;

      app.querySelector(".start-again").addEventListener("click", () => {
        window.location.href = "https://hattapivot.my.canva.site/digital-thrift-market/";
      });
    }

    renderQuestion(0);
  </script>
</body>
</html>
